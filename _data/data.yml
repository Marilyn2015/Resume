experiences:
  title: Experience
  info:
    - role: Computer Systems Analyst
      time: Sep 2023–Present
      company: Bering Sea Environmental LLC
      details: |
        Manage the secure handling, transfer, and validation of mission data across ICADS and PCDS environments, ensuring end-to-end data integrity, confidentiality, and compliance with DoD security standards. Perform system diagnostics, resolve data-flow issues, and maintain operational continuity for mission-critical systems that directly support Air Force operations.

        Oversee radio communications and assigned frequencies within LMOC operations to support pilots during live flight activity. Coordinate closely with aircrew to prepare, verify, and deliver mission data for debriefs, ensuring accuracy and consistency across reporting products used by pilots, instructors, and students.

        Contributed to TEMPEST package development and submission and supported facility transition efforts involving emission-security requirements, protected distribution systems, and secure facility configuration. Perform monthly patching, system updates, and security hardening in alignment with DoD cybersecurity directives to reduce risk and maintain system integrity.

        Tools and platforms include PCDS, ANGEL, ICADS, SolarWinds, and MSCT.

    - role: Owner
      time: Aug 2013–Aug 2023
      company: Virginia Natural Cleaning Solutions
      details: |
        Founded and scaled Virginia Natural Cleaning Solutions from the ground up with no formal business background, building the company through initiative, discipline, and a strong commitment to service quality. Oversaw marketing, client acquisition, service delivery, vendor coordination, quoting, inventory control, bookkeeping, and day-to-day operational management.

        Built the company into a certified SWaM vendor and secured multiple HUD contracts specializing in inspections and compliance-focused services. Grew the business from a small customer base into a stable revenue-generating company with apartment cleaning contracts across Newport News within 18 months, demonstrating the ability to build trust, scale operations, and manage a business with consistency and professionalism.

    - role: Lead Leasing Consultant
      time: Nov 2017–Feb 2022
      company: SL Nusbaum Realty Co.
      details: |
        Coordinated the full leasing process, including applications, lease signings, compliance documentation, move-in scheduling, lead response, follow-up, and property inspections. Worked in a high-volume environment requiring strong organization, attention to detail, and consistent communication with both prospective and current residents.

        Raised occupancy from 87% to 96% within two months, increasing revenue and stabilizing the community. This performance led to a promotion from Leasing Consultant to Lead Leasing Consultant, reflecting strong sales ability, operational consistency, and effective resident relationship management.

        Known for de-escalation, resident support, and solution-focused communication, with the ability to resolve issues professionally and maintain positive client experiences.

    - role: Leasing Consultant
      time: Sep 2013–Aug 2016
      company: Seminole Trail Management LLC
      details: |
        Oversaw lease preparation, application processing, compliance documentation, rental payment entry, collections, late fees, and eviction coordination in accordance with policy and state requirements. Managed resident-facing responsibilities with professionalism, accuracy, and a strong service mindset.

        Ranked as the #1 leasing agent for five consecutive months and independently operated the property during an ownership transition, maintaining leasing, financial, and resident-facing operations without disruption. Demonstrated the ability to work independently, manage pressure, and keep operations running smoothly during periods of change.

