experiences:
  title: Experience
  info:
    - role: Computer Systems Analyst
      time: Sep 2023–Present
      company: Bering Sea Environmental LLC
      details: |
        Manage the secure handling, transfer, and validation of mission data across ICADS and PCDS environments, ensuring end-to-end data integrity, confidentiality, and compliance with DoD security standards. Perform system diagnostics, resolve data-flow issues, and maintain operational continuity for mission-critical systems.

        Oversee radio communications and assigned frequencies within LMOC operations to support pilots during live flight activity. Coordinate mission data preparation, verification, and delivery for debriefs used by pilots, instructors, and students.

        Contributed to the TEMPEST package, facility transition efforts, monthly patching, system updates, and security hardening in alignment with DoD cybersecurity directives.

        Tools: PCDS, ANGEL, ICADS, SolarWinds, MSCT.

    - role: Owner
      time: Aug 2013–Aug 2023
      company: Virginia Natural Cleaning Solutions
      details: |
        Founded and scaled Virginia Natural Cleaning Solutions from the ground up, overseeing marketing, client acquisition, service delivery, vendor coordination, quoting, inventory control, and bookkeeping.

        Built the company into a certified SWaM vendor and secured multiple HUD contracts specializing in inspections and compliance-focused services. Grew the business from a small customer base into a stable revenue-generating company with apartment cleaning contracts across Newport News within 18 months.

    - role: Lead Leasing Consultant
      time: Nov 2017–Feb 2022
      company: SL Nusbaum Realty Co.
      details: |
        Coordinated the full leasing process, including applications, lease signings, compliance documentation, move-in scheduling, lead response, follow-up, and property inspections.

        Raised occupancy from 87% to 96% in two months, increasing revenue and stabilizing the community. This performance led to a promotion from Leasing Consultant to Lead Leasing Consultant.

        Known for de-escalation, resident support, and solution-focused communication.

    - role: Leasing Consultant
      time: Sep 2013–Aug 2016
      company: Seminole Trail Management LLC
      details: |
        Oversaw lease preparation, application processing, compliance documentation, rental payment entry, collections, late fees, and eviction coordination in accordance with policy and state requirements.

        Ranked as the #1 leasing agent for five consecutive months and independently operated the property during an ownership transition, maintaining leasing, financial, and resident-facing operations without disruption.

