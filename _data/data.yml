career-profile:
  title: Career Profile
  summary: |
    Cybersecurity and systems professional supporting DoD and policy-regulated environments, with hands-on experience in data protection, secure systems administration, mission-critical operations, and compliance-driven workflows. CompTIA A+, Security+, and CySA+ certified. Currently supporting United States Air Force operations in a secure environment, with direct experience in mission data handling, system validation, radio support operations, and secure facility requirements. In addition to my formal systems role, I have expanded my technical skill set through self-directed learning in React, Firebase, cloud architecture, privacy-focused identity systems, and hands-on use of artificial intelligence tools. My project work includes a zero-knowledge platform now live in a recognized technology ecosystem, along with user-facing web and design projects. Active Security Clearance.

