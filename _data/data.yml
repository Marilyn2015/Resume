career-profile:
  title: Career Profile
  summary: |
    Cybersecurity and systems professional with experience supporting DoD and policy-regulated environments, specializing in data protection, secure system administration, and mission-critical operations. With CompTIA A+, Security+, and CySA+ certifications, I support the United States Air Force by safeguarding sensitive information, strengthening encryption practices, and maintaining the integrity of high-security networks. I have also expanded my technical skill set into full-stack development, teaching myself React, Firebase, and modern cloud architectures, including building a privacy-focused application using zero-knowledge principles that is now live in a recognized technology ecosystem. Active Security Clearance.

